name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.5"
          cache: true

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Check gofmt
        run: |
          test -z "$(gofmt -l .)"

      - name: Build binaries
        run: |
          # Create build directory
          mkdir -p dist

          # Build for Linux amd64
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o dist/ec-linux-amd64 ./cmd/ec

          # Build for Linux arm64
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o dist/ec-linux-arm64 ./cmd/ec

          # Build for macOS amd64
          GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o dist/ec-darwin-amd64 ./cmd/ec

          # Build for macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o dist/ec-darwin-arm64 ./cmd/ec

          # Build for Windows amd64
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o dist/ec-windows-amd64.exe ./cmd/ec

          # Build for Windows arm64
          GOOS=windows GOARCH=arm64 go build -trimpath -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o dist/ec-windows-arm64.exe ./cmd/ec

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        if: ${{ !endsWith(github.ref_name, '-test') }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ec-linux-amd64
            dist/ec-linux-arm64
            dist/ec-darwin-amd64
            dist/ec-darwin-arm64
            dist/ec-windows-amd64.exe
            dist/ec-windows-arm64.exe
            dist/checksums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    # Only publish for real tag pushes, skipping -test tags so that the
    # npm package is never ahead of an actual GitHub Release (the
    # postinstall script downloads binaries from that release).
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !endsWith(github.ref_name, '-test') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync package.json version to tag
        working-directory: npm
        run: |
          version="${GITHUB_REF_NAME#v}"
          node -e '
            const fs = require("node:fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = process.argv[1];
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          ' "$version"
          echo "published version: $version"

      - name: Publish to npm
        working-directory: npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
